<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stars Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-button-color: #0088cc;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-hint-color: #999999;
            --tg-theme-text-color: #000000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 400px; }

        .card {
            background: rgba(128, 128, 128, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(128, 128, 128, 0.1);
        }

        h3 { margin-top: 0; color: var(--tg-theme-button-color); }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-deposit { background-color: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); }
        .btn-stars { background-color: #31b545; color: white; margin-top: 10px; }
        .btn:active { opacity: 0.7; }

        .hint { color: var(--tg-theme-hint-color); font-size: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3>💰 Balansni to'ldirish</h3>
        <p class="hint">Click orqali hisobingizni so'mda to'ldiring</p>
        <input type="number" id="amount" placeholder="Summani kiriting (masalan: 10000)" min="1000">
        <button class="btn btn-deposit" onclick="sendDeposit()">Hisobni to'ldirish</button>
    </div>

    <div class="card">
        <h3>⭐ Stars xarid qilish</h3>
        <input type="text" id="username" placeholder="@username (kimga yuborish)">
        <select id="stars_pack">
            <option value="50">50 Stars — 15,000 so'm</option>
            <option value="100">100 Stars — 29,000 so'm</option>
            <option value="250">250 Stars — 70,000 so'm</option>
        </select>
        <button class="btn btn-stars" onclick="buyStars()">Stars sotib olish</button>
    </div>
</div>

<script>
    // Telegram WebApp obyektini boshlash
    const tg = window.Telegram.WebApp;
    tg.expand(); // Ilovani to'liq ekranga yoyish
    tg.ready();

    function sendDeposit() {
        const amount = document.getElementById('amount').value;
        if (amount < 1000) {
            tg.showAlert("Minimal summa 1000 so'm bo'lishi kerak!");
            return;
        }
        // Botga ma'lumot yuborish
        tg.sendData(`deposit:${amount}`);
    }

    function buyStars() {
        const username = document.getElementById('username').value;
        const stars = document.getElementById('stars_pack').value;
        
        if (!username.startsWith('@')) {
            tg.showAlert("Username @ bilan boshlanishi shart!");
            return;
        }
        
        // Tasdiqlash oynasi
        tg.showConfirm(`${username} hisobiga ${stars} ta Stars yuborasizmi?`, (confirmed) => {
            if (confirmed) {
                tg.sendData(`buy_stars:${username}:${stars}`);
            }
        });
    }
</script>

</body>
</html>
